    <h2 id="_1">关于《邦史》</h2>
<p>《邦史》是利用纪传体重写Bang dream剧情的同人二创作品，旨在构建Bang dream世界观下的伪纪传体断代史。</p>
<p>包括本纪2篇，载记8篇，志5篇，列传20篇。</p>
<p>主要内容包括：</p>
<p>-TV动画1-3季以及MyGO</p>
<p>-游戏乐队故事BS1-BS3</p>
<p>-游戏活动剧情1-300期</p>
